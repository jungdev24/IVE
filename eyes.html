<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IVE 눈 맞추기 👀💜</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#0a0015;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    .wrap{width:100%;max-width:500px;padding:16px;}

    .header{text-align:center;padding:20px 0 14px;}
    .logo{font-size:1.4rem;font-weight:800;background:linear-gradient(90deg,#ce93d8,#f48fb1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .sub{font-size:0.78rem;color:rgba(255,255,255,0.3);margin-top:5px;}

    /* 진행바 */
    .prog{width:100%;height:5px;background:rgba(255,255,255,0.07);border-radius:3px;margin-bottom:12px;overflow:hidden;}
    .prog-fill{height:100%;background:linear-gradient(90deg,#7c4dff,#ff4081);border-radius:3px;transition:width .4s;}

    .info-row{display:flex;justify-content:space-between;margin-bottom:12px;font-size:0.75rem;color:rgba(255,255,255,0.35);}
    .score-v{color:#ce93d8;font-weight:700;}

    /* 눈 사진 영역 */
    .eye-box{width:100%;aspect-ratio:3/1;border-radius:16px;overflow:hidden;margin-bottom:16px;background:#160030;position:relative;border:1px solid rgba(255,255,255,0.08);}
    .eye-img{width:100%;height:100%;object-fit:cover;display:block;transition:all .6s;}

    /* 힌트 레벨 */
    .hint-bar{display:flex;gap:6px;justify-content:center;margin-bottom:14px;}
    .hint-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.1);}
    .hint-dot.used{background:#7c4dff;}
    .hint-dot.current{background:#ff4081;}

    /* 멤버 선택 버튼 */
    .members{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
    .mem-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);cursor:pointer;transition:all .2s;color:#fff;}
    .mem-btn:hover{background:rgba(124,77,255,0.2);border-color:rgba(124,77,255,0.5);}
    .mem-btn .emoji{font-size:1.4rem;}
    .mem-btn .name{font-size:0.8rem;font-weight:600;}
    .mem-btn.correct{background:rgba(0,200,100,0.2);border-color:#69f0ae;color:#69f0ae;}
    .mem-btn.wrong{background:rgba(255,50,50,0.12);border-color:rgba(255,80,80,0.5);color:#ff8a80;}
    .mem-btn.disabled{pointer-events:none;opacity:0.4;}
    .mem-btn.answer{border-color:#69f0ae;color:#69f0ae;}

    /* 피드백 */
    .feedback{text-align:center;min-height:40px;margin-bottom:10px;font-size:0.9rem;font-weight:700;transition:opacity .3s;}

    /* 다음 버튼 */
    .next{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,#7c4dff,#ff4081);color:#fff;font-size:0.92rem;font-weight:700;cursor:pointer;display:none;}
    .next.show{display:block;}

    /* 시작/결과 */
    .screen{text-align:center;padding:50px 16px;}
    .screen-emoji{font-size:4rem;margin-bottom:16px;}
    .screen-title{font-size:1.4rem;font-weight:800;margin-bottom:8px;}
    .screen-sub{font-size:0.85rem;color:rgba(255,255,255,0.4);margin-bottom:24px;line-height:1.7;}
    .screen-score{font-size:2.2rem;font-weight:800;background:linear-gradient(90deg,#ce93d8,#f48fb1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;}
    .screen-detail{font-size:0.78rem;color:rgba(255,255,255,0.3);margin-bottom:24px;}
    .action-btn{padding:14px 40px;border:none;border-radius:12px;background:linear-gradient(135deg,#7c4dff,#ff4081);color:#fff;font-size:0.95rem;font-weight:700;cursor:pointer;}

    /* 정답 공개 애니메이션 */
    .reveal{text-align:center;margin-bottom:10px;}
    .reveal-name{font-size:1.1rem;font-weight:800;color:#ce93d8;}
    .reveal-sub{font-size:0.7rem;color:rgba(255,255,255,0.3);margin-top:3px;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">👀 IVE 눈 맞추기</div>
    <div class="sub">눈만 보고 누구인지 맞춰보세요!</div>
  </div>

  <!-- 시작 -->
  <div class="screen" id="startScreen">
    <div class="screen-emoji">👀</div>
    <div class="screen-title">누구의 눈일까요?</div>
    <div class="screen-sub">IVE 멤버의 눈 사진을 보고<br>누구인지 맞춰보세요!<br>틀리면 조금씩 더 보여드려요 💜</div>
    <button class="action-btn" onclick="startGame()">시작하기</button>
  </div>

  <!-- 게임 -->
  <div id="gameScreen" style="display:none;">
    <div class="prog"><div class="prog-fill" id="progFill"></div></div>
    <div class="info-row">
      <span id="qCnt">1 / 10</span>
      <span>점수: <span class="score-v" id="scoreV">0</span></span>
    </div>

    <div class="eye-box" id="eyeBox">
      <img class="eye-img" id="eyeImg"/>
    </div>

    <div class="hint-bar" id="hintBar"></div>

    <div class="feedback" id="feedback"></div>

    <div class="reveal" id="reveal" style="display:none;">
      <div class="reveal-name" id="revealName"></div>
      <div class="reveal-sub" id="revealSub"></div>
    </div>

    <div class="members" id="members"></div>

    <button class="next" id="nextBtn" onclick="nextRound()">다음 문제</button>
  </div>

  <!-- 결과 -->
  <div class="screen" id="resultScreen" style="display:none;">
    <div class="screen-emoji" id="resEmoji"></div>
    <div class="screen-title">결과</div>
    <div class="screen-score" id="resScore"></div>
    <div class="screen-sub" id="resMsg"></div>
    <div class="screen-detail" id="resDetail"></div>
    <button class="action-btn" onclick="location.reload()">다시 도전</button>
  </div>
</div>

<script>
const MEMBERS = [
  {name:'유진', emoji:'🐶', color:'#e040fb'},
  {name:'가을', emoji:'🐿️', color:'#448aff'},
  {name:'레이', emoji:'🦋', color:'#69f0ae'},
  {name:'원영', emoji:'🐰', color:'#ff4081'},
  {name:'리즈', emoji:'🐈‍⬛', color:'#40c4ff'},
  {name:'이서', emoji:'🐯', color:'#ffd740'},
];

// 각 사진의 눈 위치 설정 (object-position %)
// [이미지URL, 정답멤버인덱스, 눈y위치%, 얼굴중심x%]
const PHOTOS = [
  // 유진
  {url:'https://kprofiles.com/wp-content/uploads/2021/11/yujin-768x1024.jpg', member:0, eyeY:22, eyeX:50, label:'유진 프로필'},
  // 가을
  {url:'https://kprofiles.com/wp-content/uploads/2021/11/SnapInsta.to_628181153_18084368660601032_393818886811121239_n-769x1024.jpg', member:1, eyeY:20, eyeX:48, label:'가을 프로필'},
  // 레이
  {url:'https://kprofiles.com/wp-content/uploads/2021/11/rei-9-768x1024.jpg', member:2, eyeY:22, eyeX:50, label:'레이 프로필'},
  // 원영
  {url:'https://kprofiles.com/wp-content/uploads/2021/11/wonyong-768x1024.jpg', member:3, eyeY:18, eyeX:50, label:'원영 프로필'},
  // 리즈
  {url:'https://kprofiles.com/wp-content/uploads/2021/11/liz-9-768x1024.jpg', member:4, eyeY:22, eyeX:50, label:'리즈 프로필'},
  // 이서
  {url:'https://kprofiles.com/wp-content/uploads/2021/11/IMG_8374-600x800.jpeg', member:5, eyeY:20, eyeX:50, label:'이서 프로필'},
];

// 줌 레벨 (틀릴수록 넓어짐)
const ZOOM_LEVELS = [
  {scale: 4.5, ratio: '5/1'},   // 눈만
  {scale: 3.0, ratio: '3.5/1'}, // 눈+코 약간
  {scale: 2.0, ratio: '2.5/1'}, // 얼굴 중간
  {scale: 1.2, ratio: '2/1'},   // 거의 전체
  {scale: 1.0, ratio: '3/2'},   // 전체 공개
];

let rounds=[], ri=0, score=0, attempts=0, answered=false;
const TOTAL = 10;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startGame(){
  // 각 멤버 최소 1번씩 + 나머지 랜덤
  let pool = [];
  for(let i=0;i<6;i++) pool.push(PHOTOS[i]);
  // 나머지 4문제는 랜덤
  const extra = shuffle(PHOTOS).slice(0, TOTAL - 6);
  pool = pool.concat(extra);
  rounds = shuffle(pool).slice(0, TOTAL);
  ri=0; score=0;
  document.getElementById('startScreen').style.display='none';
  document.getElementById('gameScreen').style.display='block';
  showRound();
}

function showRound(){
  answered=false;
  attempts=0;
  const photo = rounds[ri];

  document.getElementById('progFill').style.width=((ri/TOTAL)*100)+'%';
  document.getElementById('qCnt').textContent=`${ri+1} / ${TOTAL}`;
  document.getElementById('scoreV').textContent=score;
  document.getElementById('feedback').textContent='';
  document.getElementById('reveal').style.display='none';
  document.getElementById('nextBtn').classList.remove('show');

  // 힌트 바
  const hb = document.getElementById('hintBar');
  hb.innerHTML = ZOOM_LEVELS.map((_,i)=>`<div class="hint-dot${i===0?' current':''}"></div>`).join('');

  // 이미지 설정 (최대 줌)
  setZoom(0, photo);

  // 멤버 버튼
  const mem = document.getElementById('members');
  mem.innerHTML = MEMBERS.map((m,i)=>
    `<button class="mem-btn" data-idx="${i}" onclick="guess(${i})">
      <span class="emoji">${m.emoji}</span>
      <span class="name">${m.name}</span>
    </button>`
  ).join('');
}

function setZoom(level, photo){
  const img = document.getElementById('eyeImg');
  const box = document.getElementById('eyeBox');
  const z = ZOOM_LEVELS[Math.min(level, ZOOM_LEVELS.length-1)];

  img.src = photo.url;
  img.style.objectPosition = `${photo.eyeX}% ${photo.eyeY}%`;
  img.style.transform = `scale(${z.scale})`;
  box.style.aspectRatio = z.ratio;

  // 힌트 바 업데이트
  document.querySelectorAll('.hint-dot').forEach((d,i)=>{
    d.className = 'hint-dot';
    if(i < level) d.classList.add('used');
    if(i === level) d.classList.add('current');
  });
}

function guess(idx){
  if(answered) return;
  const photo = rounds[ri];
  const correct = idx === photo.member;

  if(correct){
    // 정답!
    answered = true;
    const pts = Math.max(5 - attempts, 1); // 첫 시도 5점, 갈수록 감소
    score += pts;
    document.getElementById('scoreV').textContent = score;
    document.getElementById('feedback').innerHTML = `<span style="color:#69f0ae">🎉 정답! +${pts}점</span>`;

    // 버튼 상태
    document.querySelectorAll('.mem-btn').forEach(b=>{
      b.classList.add('disabled');
      if(parseInt(b.dataset.idx)===idx) b.classList.add('correct');
    });

    revealAnswer(photo);
  } else {
    // 오답
    attempts++;
    const btn = document.querySelector(`.mem-btn[data-idx="${idx}"]`);
    btn.classList.add('wrong','disabled');
    document.getElementById('feedback').innerHTML = `<span style="color:#ff8a80">틀렸어요! 조금 더 보여드릴게요</span>`;

    if(attempts >= ZOOM_LEVELS.length - 1){
      // 모든 힌트 소진 → 정답 공개
      answered = true;
      document.querySelectorAll('.mem-btn').forEach(b=>{
        b.classList.add('disabled');
        if(parseInt(b.dataset.idx)===photo.member) b.classList.add('answer');
      });
      document.getElementById('feedback').innerHTML = `<span style="color:#ffd54f">아쉬워요! 정답을 공개합니다</span>`;
      revealAnswer(photo);
    } else {
      // 더 많이 보여주기
      setZoom(attempts, photo);
    }
  }
}

function revealAnswer(photo){
  // 전체 사진 공개
  setZoom(ZOOM_LEVELS.length - 1, photo);

  const m = MEMBERS[photo.member];
  document.getElementById('reveal').style.display='block';
  document.getElementById('revealName').textContent = `${m.emoji} ${m.name}`;
  document.getElementById('revealSub').textContent = photo.label;

  if(ri < TOTAL - 1){
    document.getElementById('nextBtn').textContent = '다음 문제';
  } else {
    document.getElementById('nextBtn').textContent = '결과 보기';
  }
  document.getElementById('nextBtn').classList.add('show');
}

function nextRound(){
  ri++;
  if(ri >= TOTAL){
    showResult();
    return;
  }
  showRound();
}

function showResult(){
  document.getElementById('gameScreen').style.display='none';
  const r = document.getElementById('resultScreen');
  r.style.display='block';

  const maxScore = TOTAL * 5;
  const pct = Math.round((score/maxScore)*100);
  let emoji='😢', msg='눈 공부가 더 필요해요!';
  if(pct>=80){ emoji='👀'; msg='IVE 멤버의 눈을 완벽히 구분하시네요!\n진정한 DIVE!'; }
  else if(pct>=60){ emoji='💜'; msg='꽤 잘 맞추셨어요!\n조금만 더 연습하면 완벽!'; }
  else if(pct>=40){ emoji='😊'; msg='괜찮아요!\n사진을 더 많이 보면 실력이 올라갈 거예요!'; }

  document.getElementById('resEmoji').textContent=emoji;
  document.getElementById('resScore').textContent=`${score} / ${maxScore}점`;
  document.getElementById('resMsg').textContent=msg;
  document.getElementById('resDetail').textContent=`${TOTAL}문제 · 만점 ${maxScore}점 기준`;
}
</script>
</body>
</html>
