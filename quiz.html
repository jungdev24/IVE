<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IVE 퀴즈 💜</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#0a0015;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    .wrap{width:100%;max-width:520px;padding:16px;}

    /* 헤더 */
    .header{text-align:center;padding:24px 0 16px;}
    .logo{font-size:1.6rem;font-weight:800;background:linear-gradient(90deg,#ce93d8,#f48fb1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .sub{font-size:0.8rem;color:rgba(255,255,255,0.35);margin-top:6px;}

    /* 진행바 */
    .prog-bar{width:100%;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;margin-bottom:16px;overflow:hidden;}
    .prog-fill{height:100%;background:linear-gradient(90deg,#7c4dff,#ff4081);border-radius:3px;transition:width .4s;}

    /* 점수 */
    .score-row{display:flex;justify-content:space-between;margin-bottom:14px;font-size:0.78rem;color:rgba(255,255,255,0.4);}
    .score-val{color:#ce93d8;font-weight:700;}

    /* 카드 */
    .q-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:24px 20px;margin-bottom:16px;min-height:120px;}
    .q-num{font-size:0.7rem;color:#7c4dff;font-weight:700;margin-bottom:8px;}
    .q-text{font-size:1.05rem;font-weight:700;line-height:1.6;}

    /* 선택지 */
    .opts{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
    .opt{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:14px 16px;cursor:pointer;font-size:0.9rem;transition:all .2s;text-align:left;color:#fff;}
    .opt:hover{background:rgba(124,77,255,0.15);border-color:rgba(124,77,255,0.4);}
    .opt.correct{background:rgba(0,200,100,0.2);border-color:rgba(0,200,100,0.6);color:#69f0ae;}
    .opt.wrong{background:rgba(255,50,50,0.15);border-color:rgba(255,50,50,0.5);color:#ff8a80;}
    .opt.disabled{pointer-events:none;opacity:0.6;}
    .opt.show-correct{border-color:rgba(0,200,100,0.5);color:#69f0ae;}

    /* 해설 */
    .explain{background:rgba(124,77,255,0.08);border:1px solid rgba(124,77,255,0.2);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:0.8rem;color:rgba(255,255,255,0.6);line-height:1.5;display:none;}
    .explain.show{display:block;}

    /* 다음 버튼 */
    .next-btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#7c4dff,#ff4081);color:#fff;font-size:0.95rem;font-weight:700;cursor:pointer;display:none;transition:opacity .2s;}
    .next-btn:hover{opacity:0.85;}
    .next-btn.show{display:block;}

    /* 결과 화면 */
    .result{text-align:center;padding:40px 20px;display:none;}
    .result.show{display:block;}
    .result-emoji{font-size:4rem;margin-bottom:16px;}
    .result-title{font-size:1.5rem;font-weight:800;margin-bottom:8px;}
    .result-score{font-size:2.2rem;font-weight:800;background:linear-gradient(90deg,#ce93d8,#f48fb1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
    .result-msg{font-size:0.9rem;color:rgba(255,255,255,0.45);margin-bottom:24px;line-height:1.6;}
    .result-detail{font-size:0.8rem;color:rgba(255,255,255,0.3);margin-bottom:24px;}
    .retry-btn{padding:14px 40px;border:none;border-radius:12px;background:linear-gradient(135deg,#7c4dff,#ff4081);color:#fff;font-size:0.95rem;font-weight:700;cursor:pointer;}

    /* 시작 화면 */
    .start{text-align:center;padding:60px 20px;}
    .start-emoji{font-size:4rem;margin-bottom:16px;}
    .start-title{font-size:1.4rem;font-weight:800;margin-bottom:8px;}
    .start-sub{font-size:0.85rem;color:rgba(255,255,255,0.4);margin-bottom:24px;line-height:1.6;}
    .start-btn{padding:14px 40px;border:none;border-radius:12px;background:linear-gradient(135deg,#7c4dff,#ff4081);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
    .start-btn:hover{opacity:0.85;}
    .mode-btns{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
    .mode-btn{padding:10px 20px;border:1px solid rgba(255,255,255,0.15);border-radius:10px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);font-size:0.82rem;cursor:pointer;transition:all .2s;}
    .mode-btn.on{background:rgba(124,77,255,0.3);border-color:#7c4dff;color:#fff;font-weight:700;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">💜 IVE 퀴즈</div>
    <div class="sub">아이브를 얼마나 알고 있나요?</div>
  </div>

  <!-- 시작 -->
  <div class="start" id="startScreen">
    <div class="start-emoji">💜</div>
    <div class="start-title">IVE 퀴즈 챌린지</div>
    <div class="start-sub">총 50문제 중 랜덤으로 출제됩니다<br>당신은 진정한 DIVE인가요?</div>
    <div class="mode-btns">
      <button class="mode-btn on" id="m10" onclick="setMode(10)">10문제</button>
      <button class="mode-btn" id="m20" onclick="setMode(20)">20문제</button>
      <button class="mode-btn" id="m50" onclick="setMode(50)">50문제</button>
    </div>
    <button class="start-btn" onclick="startQuiz()">시작하기</button>
  </div>

  <!-- 퀴즈 -->
  <div id="quizScreen" style="display:none;">
    <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    <div class="score-row">
      <span id="qCounter">1 / 10</span>
      <span>정답: <span class="score-val" id="scoreVal">0</span></span>
    </div>
    <div class="q-card">
      <div class="q-num" id="qNum">Q1</div>
      <div class="q-text" id="qText"></div>
    </div>
    <div class="opts" id="opts"></div>
    <div class="explain" id="explain"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQ()">다음 문제</button>
  </div>

  <!-- 결과 -->
  <div class="result" id="resultScreen">
    <div class="result-emoji" id="resEmoji"></div>
    <div class="result-title">퀴즈 완료!</div>
    <div class="result-score" id="resScore"></div>
    <div class="result-msg" id="resMsg"></div>
    <div class="result-detail" id="resDetail"></div>
    <button class="retry-btn" onclick="location.reload()">다시 도전</button>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  // ── 그룹 기본 ──
  {q:"IVE의 데뷔일은?", o:["2021년 12월 1일","2022년 1월 1일","2021년 11월 1일","2022년 3월 14일"], a:0, e:"IVE는 2021년 12월 1일 싱글 앨범 'ELEVEN'으로 데뷔했어요."},
  {q:"IVE의 소속사는?", o:["스타쉽엔터테인먼트","JYP엔터테인먼트","SM엔터테인먼트","하이브"], a:0, e:"스타쉽엔터테인먼트 소속이에요."},
  {q:"IVE의 그룹명은 무엇의 줄임말인가요?", o:["I HAVE","I VERY","I VOICE","I VIEW"], a:0, e:"I'VE = I HAVE. '우리가 가진 것을 당당히 보여주겠다'는 의미예요."},
  {q:"IVE의 멤버는 총 몇 명인가요?", o:["6명","5명","7명","4명"], a:0, e:"유진, 가을, 레이, 원영, 리즈, 이서 6명이에요."},
  {q:"IVE의 팬덤 이름은?", o:["DIVE","LOVE","HIVE","FIVE"], a:0, e:"IVE의 공식 팬덤명은 DIVE(다이브)예요."},
  {q:"IVE의 데뷔곡은?", o:["ELEVEN","LOVE DIVE","After LIKE","Kitsch"], a:0, e:"첫 싱글 앨범의 타이틀곡 'ELEVEN'으로 데뷔했어요."},
  {q:"IVE 멤버 중 일본 출신은?", o:["레이","리즈","이서","가을"], a:0, e:"레이는 일본 아이치현 나고야 출신이에요."},
  {q:"IVE의 리더는 누구인가요?", o:["안유진","장원영","가을","리즈"], a:0, e:"안유진이 IVE의 리더예요."},
  {q:"IVE의 막내 멤버는?", o:["이서","리즈","레이","가을"], a:0, e:"이서(2007년생)가 막내예요."},
  {q:"IVE의 최연장 멤버는?", o:["가을","안유진","레이","리즈"], a:0, e:"가을(2002년생)이 최연장자예요."},

  // ── 안유진 ──
  {q:"안유진의 생일은?", o:["9월 1일","9월 24일","8월 31일","2월 3일"], a:0, e:"안유진은 2003년 9월 1일생이에요."},
  {q:"안유진의 키는?", o:["173cm","170cm","168cm","175cm"], a:0, e:"안유진의 키는 173cm예요."},
  {q:"안유진의 MBTI는?", o:["ISTP","ENFP","INFJ","ENTJ"], a:0, e:"안유진의 MBTI는 ISTP예요."},
  {q:"안유진의 대표 이모지는?", o:["🐶","🐰","🦋","🐯"], a:0, e:"안유진의 대표 이모지는 강아지 🐶예요."},
  {q:"안유진의 출생지는?", o:["대전","서울","인천","부산"], a:0, e:"안유진은 대전 서구 둔산동 출신이에요."},
  {q:"안유진이 참여했던 오디션 프로그램은?", o:["프로듀스 48","K팝스타","걸스플래닛 999","아이돌 학교"], a:0, e:"안유진은 프로듀스 48에 참여해 5위로 IZ*ONE 멤버가 됐어요."},

  // ── 장원영 ──
  {q:"장원영의 MBTI는?", o:["ENTJ","ISTP","INFP","ESFJ"], a:0, e:"장원영의 MBTI는 ENTJ예요."},
  {q:"장원영의 혈액형은?", o:["O형","A형","B형","AB형"], a:0, e:"장원영의 혈액형은 O형이에요."},
  {q:"장원영의 대표 이모지는?", o:["🐰","🐶","🐿️","🐈‍⬛"], a:0, e:"장원영의 대표 이모지는 토끼 🐰예요."},
  {q:"장원영의 생일은?", o:["8월 31일","9월 1일","11월 21일","2월 21일"], a:0, e:"장원영은 2004년 8월 31일생이에요."},
  {q:"장원영이 프로듀스 48에서 기록한 최종 순위는?", o:["1위","2위","3위","5위"], a:0, e:"장원영은 프로듀스 48에서 1위로 IZ*ONE 센터가 됐어요."},
  {q:"장원영이 연주할 수 있는 악기가 아닌 것은?", o:["기타","피아노","플루트","바이올린"], a:0, e:"장원영은 피아노, 플루트, 바이올린을 연주할 수 있어요."},

  // ── 가을 ──
  {q:"가을의 본명은?", o:["김가을","이가을","박가을","정가을"], a:0, e:"가을의 본명은 김가을이에요."},
  {q:"가을의 생일은?", o:["9월 24일","9월 1일","10월 15일","8월 31일"], a:0, e:"가을은 2002년 9월 24일생이에요."},
  {q:"가을의 키는?", o:["164cm","170cm","173cm","168cm"], a:0, e:"가을의 키는 164cm으로 멤버 중 가장 작아요."},
  {q:"가을의 출생지는?", o:["인천","서울","대전","제주"], a:0, e:"가을은 인천 부평구 출신이에요."},
  {q:"가을의 대표 이모지는?", o:["🐿️","🐶","🐰","🦋"], a:0, e:"가을의 대표 이모지는 다람쥐 🐿️예요."},
  {q:"가을이 스타쉽에 입사하게 된 계기는?", o:["댄스 대회에서 스카우트","오디션 합격","친구 소개","길거리 캐스팅"], a:0, e:"가을은 2017년 인천에서 열린 댄스 대회에서 스카우트됐어요."},

  // ── 레이 ──
  {q:"레이의 본명은?", o:["나오이 레이","타나카 레이","스즈키 레이","사토 레이"], a:0, e:"레이의 본명은 나오이 레이(直井れい)예요."},
  {q:"레이의 출신 도시는?", o:["나고야","도쿄","오사카","후쿠오카"], a:0, e:"레이는 일본 아이치현 나고야 출신이에요."},
  {q:"레이의 MBTI는?", o:["INFJ","ISTP","ENTJ","ESTP"], a:0, e:"레이의 MBTI는 INFJ예요."},
  {q:"레이의 포지션은?", o:["메인 래퍼, 서브 보컬","메인 보컬","리드 댄서","메인 댄서"], a:0, e:"레이는 메인 래퍼이자 서브 보컬이에요."},
  {q:"레이의 대표 이모지는?", o:["🦋","🐿️","🐯","🐶"], a:0, e:"레이의 대표 이모지는 나비 🦋예요."},
  {q:"레이의 특기는?", o:["그림 그리기","피아노","요리","수영"], a:0, e:"레이는 그림을 잘 그리고 예쁜 물건 수집을 좋아해요."},

  // ── 리즈 ──
  {q:"리즈의 본명은?", o:["김지원","이지원","박지원","정지원"], a:0, e:"리즈의 본명은 김지원이에요."},
  {q:"리즈의 출생지는?", o:["제주도","서울","부산","대구"], a:0, e:"리즈는 제주도 출신이에요."},
  {q:"리즈의 혈액형은?", o:["AB형","A형","B형","O형"], a:0, e:"리즈의 혈액형은 AB형이에요."},
  {q:"리즈의 MBTI는?", o:["INTP","ISTP","ENTJ","INFJ"], a:0, e:"리즈의 MBTI는 INTP예요."},
  {q:"리즈의 포지션은?", o:["메인 보컬","메인 댄서","메인 래퍼","리드 댄서"], a:0, e:"리즈는 메인 보컬을 맡고 있어요."},
  {q:"리즈의 대표 이모지는?", o:["🐈‍⬛","🐶","🐰","🐿️"], a:0, e:"리즈의 대표 이모지는 검은 고양이 🐈‍⬛예요."},

  // ── 이서 ──
  {q:"이서의 본명은?", o:["이현서","이수연","이서영","이서윤"], a:0, e:"이서의 본명은 이현서예요."},
  {q:"이서의 생일은?", o:["2월 21일","2월 3일","11월 21일","9월 24일"], a:0, e:"이서는 2007년 2월 21일생이에요."},
  {q:"이서의 MBTI는?", o:["ESTP","ISTP","INFJ","ENTJ"], a:0, e:"이서의 MBTI는 ESTP예요."},
  {q:"이서의 대표 이모지는?", o:["🐯","🐶","🦋","🐰"], a:0, e:"이서의 대표 이모지는 호랑이 🐯예요."},
  {q:"이서가 데뷔 전 활동했던 것은?", o:["SM 키즈 모델","JYP 연습생","YG 연습생","아역 배우"], a:0, e:"이서는 데뷔 전 SM엔터테인먼트 키즈 모델로 활동했어요."},

  // ── 음악/앨범 ──
  {q:"'LOVE DIVE'는 몇 번째 싱글 앨범의 타이틀곡인가요?", o:["2번째","1번째","3번째","4번째"], a:0, e:"LOVE DIVE는 IVE의 두 번째 싱글 앨범 타이틀곡이에요."},
  {q:"IVE의 첫 정규 앨범 이름은?", o:["I've IVE","IVE SWITCH","IVE EMPATHY","REVIVE+"], a:0, e:"2023년 발매된 'I've IVE'가 첫 정규 앨범이에요."},
  {q:"'REVIVE+'는 IVE의 몇 번째 정규 앨범인가요?", o:["2번째","1번째","3번째","미니 앨범"], a:0, e:"REVIVE+는 2026년 발매된 두 번째 정규 앨범이에요."},

  // ── 기록/수상 ──
  {q:"'ELEVEN'은 음악방송에서 총 몇 관왕을 기록했나요?", o:["13관왕","10관왕","7관왕","15관왕"], a:0, e:"데뷔곡 ELEVEN은 음악방송 13관왕을 기록했어요."},
  {q:"IVE가 골든디스크에서 최초로 동시에 수상한 두 개의 상은?", o:["신인상 + 대상","신인상 + 본상","본상 + 대상","인기상 + 대상"], a:0, e:"제37회 골든디스크어워즈에서 신인상과 대상을 동시 수상한 역사상 유일한 아티스트예요."},
  {q:"IVE의 평균 신장은 약 몇 cm인가요?", o:["169cm","165cm","172cm","167cm"], a:0, e:"평균 신장 약 169.3cm로 '키다리돌'이라 불려요."},
];

let mode=10, questions=[], qi=0, score=0, answered=false;

function setMode(n){
  mode=n;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('m'+n).classList.add('on');
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startQuiz(){
  questions=shuffle(ALL_QUESTIONS).slice(0,mode);
  qi=0; score=0; answered=false;
  document.getElementById('startScreen').style.display='none';
  document.getElementById('quizScreen').style.display='block';
  document.getElementById('resultScreen').classList.remove('show');
  showQ();
}

function showQ(){
  answered=false;
  const q=questions[qi];
  document.getElementById('progFill').style.width=((qi/mode)*100)+'%';
  document.getElementById('qCounter').textContent=`${qi+1} / ${mode}`;
  document.getElementById('scoreVal').textContent=score;
  document.getElementById('qNum').textContent=`Q${qi+1}`;
  document.getElementById('qText').textContent=q.q;

  // 선택지 셔플 (정답 인덱스 추적)
  const indices=[0,1,2,3];
  const shuffled=shuffle(indices);
  const opts=document.getElementById('opts');
  opts.innerHTML=shuffled.map((oi,i)=>`<button class="opt" data-idx="${oi}" onclick="pick(this,${oi})">${q.o[oi]}</button>`).join('');

  document.getElementById('explain').classList.remove('show');
  document.getElementById('explain').textContent='';
  document.getElementById('nextBtn').classList.remove('show');
}

function pick(el,idx){
  if(answered) return;
  answered=true;
  const q=questions[qi];
  const correct=idx===q.a;

  if(correct){
    score++;
    el.classList.add('correct');
  } else {
    el.classList.add('wrong');
    // 정답 보여주기
    document.querySelectorAll('.opt').forEach(o=>{
      if(parseInt(o.dataset.idx)===q.a) o.classList.add('show-correct');
    });
  }
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('disabled'));
  document.getElementById('scoreVal').textContent=score;

  document.getElementById('explain').textContent=q.e;
  document.getElementById('explain').classList.add('show');

  if(qi<mode-1){
    document.getElementById('nextBtn').textContent='다음 문제';
  } else {
    document.getElementById('nextBtn').textContent='결과 보기';
  }
  document.getElementById('nextBtn').classList.add('show');
}

function nextQ(){
  qi++;
  if(qi>=mode){
    showResult();
    return;
  }
  showQ();
}

function showResult(){
  document.getElementById('quizScreen').style.display='none';
  const r=document.getElementById('resultScreen');
  r.classList.add('show');

  const pct=Math.round((score/mode)*100);
  let emoji='😢', msg='아직 공부가 필요해요!';
  if(pct>=90){ emoji='👑'; msg='당신은 진정한 DIVE! IVE 박사!'; }
  else if(pct>=70){ emoji='💜'; msg='IVE를 정말 잘 알고 있네요!'; }
  else if(pct>=50){ emoji='😊'; msg='절반은 맞혔어요! 조금만 더 공부해봐요!'; }
  else if(pct>=30){ emoji='🤔'; msg='IVE에 대해 더 알아가 봐요!'; }

  document.getElementById('resEmoji').textContent=emoji;
  document.getElementById('resScore').textContent=`${score} / ${mode} (${pct}%)`;
  document.getElementById('resMsg').textContent=msg;
  document.getElementById('resDetail').textContent=`정답 ${score}개 · 오답 ${mode-score}개`;
}
</script>
</body>
</html>
