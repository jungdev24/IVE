<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>연예인 이름 맞추기 ⭐</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#080812;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    .wrap{width:100%;max-width:520px;padding:16px;}

    .header{text-align:center;padding:20px 0 14px;}
    .logo{font-size:1.4rem;font-weight:800;background:linear-gradient(90deg,#ffd54f,#ff6e40);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .sub{font-size:0.78rem;color:rgba(255,255,255,0.3);margin-top:5px;}

    .prog{width:100%;height:5px;background:rgba(255,255,255,0.07);border-radius:3px;margin-bottom:12px;overflow:hidden;}
    .prog-fill{height:100%;background:linear-gradient(90deg,#ffd54f,#ff6e40);border-radius:3px;transition:width .4s;}
    .info-row{display:flex;justify-content:space-between;margin-bottom:14px;font-size:0.75rem;color:rgba(255,255,255,0.35);}
    .sc{color:#ffd54f;font-weight:700;}

    /* 힌트 카드 */
    .hint-area{margin-bottom:16px;}
    .hint-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px 16px;margin-bottom:8px;}
    .hint-num{font-size:0.65rem;color:#ff6e40;font-weight:700;margin-bottom:6px;}
    .hint-text{font-size:0.95rem;line-height:1.6;color:rgba(255,255,255,0.85);}
    .hint-card.locked{opacity:0.25;border-style:dashed;}
    .hint-card.locked .hint-text{filter:blur(6px);user-select:none;}

    /* 초성 표시 */
    .chosung-box{text-align:center;margin-bottom:16px;}
    .chosung{font-size:2rem;font-weight:900;letter-spacing:12px;color:#ffd54f;text-shadow:0 0 20px rgba(255,213,79,0.3);}
    .chosung-label{font-size:0.68rem;color:rgba(255,255,255,0.25);margin-top:4px;}

    /* 선택지 */
    .opts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
    .opt{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:13px 16px;cursor:pointer;font-size:0.9rem;transition:all .2s;text-align:left;color:#fff;}
    .opt:hover{background:rgba(255,213,79,0.12);border-color:rgba(255,213,79,0.4);}
    .opt.correct{background:rgba(0,200,100,0.2);border-color:#69f0ae;color:#69f0ae;}
    .opt.wrong{background:rgba(255,50,50,0.12);border-color:rgba(255,80,80,0.5);color:#ff8a80;}
    .opt.disabled{pointer-events:none;opacity:0.5;}
    .opt.show-ans{border-color:#69f0ae;color:#69f0ae;}

    .feedback{text-align:center;min-height:28px;margin-bottom:10px;font-size:0.88rem;font-weight:700;}

    .next{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,#ffd54f,#ff6e40);color:#000;font-size:0.92rem;font-weight:700;cursor:pointer;display:none;}
    .next.show{display:block;}

    /* 힌트 버튼 */
    .hint-btn{width:100%;padding:10px;border:1px solid rgba(255,213,79,0.3);border-radius:10px;background:rgba(255,213,79,0.06);color:#ffd54f;font-size:0.82rem;cursor:pointer;margin-bottom:10px;display:none;transition:all .2s;}
    .hint-btn:hover{background:rgba(255,213,79,0.15);}
    .hint-btn.show{display:block;}

    /* 시작/결과 */
    .screen{text-align:center;padding:50px 16px;}
    .screen-emoji{font-size:4rem;margin-bottom:16px;}
    .screen-title{font-size:1.4rem;font-weight:800;margin-bottom:8px;}
    .screen-sub{font-size:0.85rem;color:rgba(255,255,255,0.4);margin-bottom:24px;line-height:1.7;}
    .screen-score{font-size:2.2rem;font-weight:800;background:linear-gradient(90deg,#ffd54f,#ff6e40);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;}
    .screen-detail{font-size:0.78rem;color:rgba(255,255,255,0.3);margin-bottom:24px;}
    .action-btn{padding:14px 40px;border:none;border-radius:12px;background:linear-gradient(135deg,#ffd54f,#ff6e40);color:#000;font-size:0.95rem;font-weight:700;cursor:pointer;}
    .mode-btns{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
    .mode-btn{padding:10px 20px;border:1px solid rgba(255,255,255,0.15);border-radius:10px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);font-size:0.82rem;cursor:pointer;transition:all .2s;}
    .mode-btn.on{background:rgba(255,213,79,0.2);border-color:#ffd54f;color:#fff;font-weight:700;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">⭐ 연예인 이름 맞추기</div>
    <div class="sub">힌트를 보고 누구인지 맞춰보세요!</div>
  </div>

  <!-- 시작 -->
  <div class="screen" id="startScreen">
    <div class="screen-emoji">⭐</div>
    <div class="screen-title">나는 연예인 박사?</div>
    <div class="screen-sub">초성 + 힌트를 보고 연예인 이름을 맞춰보세요!<br>힌트를 적게 쓸수록 고득점 💪</div>
    <div class="mode-btns">
      <button class="mode-btn on" id="m10" onclick="setMode(10)">10문제</button>
      <button class="mode-btn" id="m20" onclick="setMode(20)">20문제</button>
      <button class="mode-btn" id="m30" onclick="setMode(30)">30문제</button>
    </div>
    <button class="action-btn" onclick="startGame()">시작하기</button>
  </div>

  <!-- 게임 -->
  <div id="gameScreen" style="display:none;">
    <div class="prog"><div class="prog-fill" id="progFill"></div></div>
    <div class="info-row">
      <span id="qCnt">1 / 10</span>
      <span>점수: <span class="sc" id="scV">0</span></span>
    </div>

    <div class="chosung-box">
      <div class="chosung" id="chosung"></div>
      <div class="chosung-label">이름 초성</div>
    </div>

    <div class="hint-area" id="hintArea"></div>

    <button class="hint-btn" id="hintBtn" onclick="revealHint()">💡 힌트 더 보기 (-1점)</button>

    <div class="feedback" id="feedback"></div>
    <div class="opts" id="opts"></div>
    <button class="next" id="nextBtn" onclick="nextRound()">다음 문제</button>
  </div>

  <!-- 결과 -->
  <div class="screen" id="resultScreen" style="display:none;">
    <div class="screen-emoji" id="resEmoji"></div>
    <div class="screen-title">결과 발표!</div>
    <div class="screen-score" id="resScore"></div>
    <div class="screen-sub" id="resMsg"></div>
    <div class="screen-detail" id="resDetail"></div>
    <button class="action-btn" onclick="location.reload()">다시 도전</button>
  </div>
</div>

<script>
// ── 초성 추출 ──
const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function getChosung(str){
  return [...str].map(c=>{
    const code=c.charCodeAt(0)-0xAC00;
    if(code<0||code>11171) return c;
    return CHO[Math.floor(code/588)];
  }).join('');
}

// ── 연예인 30명 데이터 ──
const CELEBS = [
  {name:'아이유', hints:['솔로 가수이자 배우','본명은 이지은','나의 아저씨, 호텔 델루나 주연'], cat:'가수'},
  {name:'유재석', hints:['대한민국 국민 MC','무한도전, 놀면 뭐하니 진행','별명: 메뚜기, 유느님'], cat:'MC'},
  {name:'이민호', hints:['꽃보다 남자, 상속자들 주연','키 187cm의 장신 배우','더킹, 파친코 출연'], cat:'배우'},
  {name:'김수현', hints:['별에서 온 그대 도민준 역','눈물의 여왕 주연','어린 시절 드림하이로 데뷔'], cat:'배우'},
  {name:'전지현', hints:['엽기적인 그녀 주연','별에서 온 그대 천송이 역','한국 영화계 톱스타'], cat:'배우'},
  {name:'송중기', hints:['태양의 후예 유시진 대위','빈센조 주연','성균관 스캔들로 이름을 알림'], cat:'배우'},
  {name:'현빈', hints:['사랑의 불시착 리정혁 역','시크릿 가든, 알함브라 출연','모태 잘생김 대표 배우'], cat:'배우'},
  {name:'손예진', hints:['사랑의 불시착 윤세리 역','현빈과 결혼','멜로 퀸이라 불림'], cat:'배우'},
  {name:'마동석', hints:['범죄도시 시리즈 주연','근육질 체형의 액션 배우','마블 이터널스에도 출연'], cat:'배우'},
  {name:'송강호', hints:['기생충 기택 역','한국 영화계의 전설적 배우','칸 영화제 남우주연상 수상'], cat:'배우'},
  {name:'이정재', hints:['오징어 게임 성기훈 역','헌트, 도둑들 출연','에미상 남우주연상 수상'], cat:'배우'},
  {name:'공유', hints:['도깨비 김신 역','부산행 주연','커피 광고의 대명사'], cat:'배우'},
  {name:'박보검', hints:['구르미 그린 달빛 주연','사또 밥 등 예능 출연','청량한 미소의 대표 배우'], cat:'배우'},
  {name:'박서준', hints:['이태원 클라쓰 박새로이 역','윤식당 출연','마블 더 마블스에 출연'], cat:'배우'},
  {name:'차은우', hints:['아스트로 출신 아이돌 배우','얼굴 천재라 불림','내 ID는 강남미인 주연'], cat:'배우'},
  {name:'한소희', hints:['부부의 세계 여다경 역','마이네임, 경성크리처 출연','걸크러시 대표 배우'], cat:'배우'},
  {name:'김태리', hints:['스물다섯 스물하나 주연','아가씨, 외계+인 출연','청초한 매력의 배우'], cat:'배우'},
  {name:'변우석', hints:['선재 업고 튀어 류선재 역','2024년 최고의 떠오르는 신예','강렬한 눈빛이 매력'], cat:'배우'},
  {name:'박보영', hints:['힘쎈여자 도봉순 주연','오 나의 귀신님 출연','동안 외모의 대표 배우'], cat:'배우'},
  {name:'수지', hints:['미스에이 출신 가수 겸 배우','국민 첫사랑이란 별명','건축학개론, 배가본드 출연'], cat:'배우/가수'},
  {name:'장원영', hints:['IVE의 비주얼 담당','프로듀스 48 최종 1위','키 173cm, MBTI는 ENTJ'], cat:'가수'},
  {name:'안유진', hints:['IVE의 리더','프로듀스 48 최종 5위','대전 출신, 이모지는 🐶'], cat:'가수'},
  {name:'제니', hints:['블랙핑크 멤버','SOLO 솔로 데뷔곡 대히트','샤넬 앰배서더'], cat:'가수'},
  {name:'정국', hints:['BTS 메인 보컬이자 막내','Standing Next to You 솔로곡','황금 막내라 불림'], cat:'가수'},
  {name:'카리나', hints:['에스파의 리더','본명은 유지민','AI 아바타 컨셉의 걸그룹'], cat:'가수'},
  {name:'임영웅', hints:['미스터트롯 우승자','팬덤 영웅시대','이제 나만 믿어요 대히트'], cat:'가수'},
  {name:'이광수', hints:['런닝맨 초기 멤버','기린이라는 별명','범죄도시 등 영화 출연'], cat:'배우'},
  {name:'지드래곤', hints:['빅뱅의 리더','본명은 권지용','K팝 패션 아이콘'], cat:'가수'},
  {name:'정호연', hints:['오징어 게임 새벽 역','톱 모델 출신 배우','에미상 후보에 오른 한국 배우'], cat:'배우'},
  {name:'나영석', hints:['1박 2일, 꽃보다 시리즈 PD','삼시세끼, 지구오락실 연출','예능 PD의 대명사'], cat:'PD'},
];

let mode=10, rounds=[], ri=0, score=0, hintLevel=0, answered=false;

function setMode(n){
  mode=n;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('m'+n).classList.add('on');
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startGame(){
  rounds = shuffle(CELEBS).slice(0, mode);
  ri=0; score=0;
  document.getElementById('startScreen').style.display='none';
  document.getElementById('gameScreen').style.display='block';
  showRound();
}

function showRound(){
  answered=false;
  hintLevel=1; // 첫 힌트만 공개

  const celeb = rounds[ri];
  document.getElementById('progFill').style.width=((ri/mode)*100)+'%';
  document.getElementById('qCnt').textContent=`${ri+1} / ${mode}`;
  document.getElementById('scV').textContent=score;
  document.getElementById('feedback').textContent='';
  document.getElementById('nextBtn').classList.remove('show');

  // 초성
  document.getElementById('chosung').textContent = getChosung(celeb.name);

  // 힌트 카드
  const ha = document.getElementById('hintArea');
  ha.innerHTML = celeb.hints.map((h,i)=>`
    <div class="hint-card ${i>=hintLevel?'locked':''}" id="hint${i}">
      <div class="hint-num">힌트 ${i+1}</div>
      <div class="hint-text">${h}</div>
    </div>
  `).join('');

  // 힌트 버튼
  const hb = document.getElementById('hintBtn');
  hb.classList.toggle('show', hintLevel < celeb.hints.length);

  // 선택지 (정답 + 같은 카테고리 or 랜덤 3명)
  const others = CELEBS.filter(c=>c.name!==celeb.name);
  const sameCat = others.filter(c=>c.cat===celeb.cat);
  const diffCat = others.filter(c=>c.cat!==celeb.cat);
  let pool = shuffle(sameCat).slice(0,2);
  if(pool.length<3) pool = pool.concat(shuffle(diffCat).slice(0,3-pool.length));
  pool.push(celeb);
  const choices = shuffle(pool).slice(0,4);
  // 정답이 없으면 추가
  if(!choices.find(c=>c.name===celeb.name)){
    choices[Math.floor(Math.random()*4)] = celeb;
  }

  const opts = document.getElementById('opts');
  opts.innerHTML = choices.map(c=>
    `<button class="opt" data-name="${c.name}" onclick="pick(this,'${c.name}')">${c.name}</button>`
  ).join('');
}

function revealHint(){
  if(answered) return;
  const celeb = rounds[ri];
  if(hintLevel >= celeb.hints.length) return;

  const card = document.getElementById('hint'+hintLevel);
  card.classList.remove('locked');
  hintLevel++;

  // 힌트 사용 시 감점
  score = Math.max(0, score - 1);
  document.getElementById('scV').textContent = score;
  document.getElementById('feedback').innerHTML = '<span style="color:#ffd54f">💡 힌트 공개! (-1점)</span>';

  if(hintLevel >= celeb.hints.length){
    document.getElementById('hintBtn').classList.remove('show');
  }
}

function pick(el, name){
  if(answered) return;
  answered = true;
  const celeb = rounds[ri];
  const correct = name === celeb.name;

  if(correct){
    const pts = 4 - hintLevel + 1; // 힌트1개=3점, 2개=2점, 3개=1점
    score += Math.max(pts, 1);
    document.getElementById('scV').textContent = score;
    el.classList.add('correct');
    document.getElementById('feedback').innerHTML = `<span style="color:#69f0ae">🎉 정답! +${Math.max(pts,1)}점</span>`;
  } else {
    el.classList.add('wrong');
    document.querySelectorAll('.opt').forEach(o=>{
      if(o.dataset.name===celeb.name) o.classList.add('show-ans');
    });
    document.getElementById('feedback').innerHTML = `<span style="color:#ff8a80">❌ 정답은 <b>${celeb.name}</b></span>`;
  }

  document.querySelectorAll('.opt').forEach(o=>o.classList.add('disabled'));

  // 모든 힌트 공개
  celeb.hints.forEach((_,i)=>{
    document.getElementById('hint'+i)?.classList.remove('locked');
  });
  document.getElementById('hintBtn').classList.remove('show');

  document.getElementById('nextBtn').textContent = ri < mode-1 ? '다음 문제' : '결과 보기';
  document.getElementById('nextBtn').classList.add('show');
}

function nextRound(){
  ri++;
  if(ri>=mode){ showResult(); return; }
  showRound();
}

function showResult(){
  document.getElementById('gameScreen').style.display='none';
  const r=document.getElementById('resultScreen');
  r.style.display='block';

  const maxScore = mode * 3;
  const pct = Math.round((score/maxScore)*100);
  let emoji='😢', msg='연예인 공부가 좀 필요해요!';
  if(pct>=90){ emoji='⭐'; msg='연예인 박사! 완벽합니다!'; }
  else if(pct>=70){ emoji='🎬'; msg='연예인을 정말 잘 아시네요!'; }
  else if(pct>=50){ emoji='😊'; msg='절반 이상 맞추셨어요! 대단해요!'; }
  else if(pct>=30){ emoji='🤔'; msg='조금만 더 관심을 가져볼까요?'; }

  document.getElementById('resEmoji').textContent=emoji;
  document.getElementById('resScore').textContent=`${score} / ${maxScore}점`;
  document.getElementById('resMsg').textContent=msg;
  document.getElementById('resDetail').textContent=`${mode}문제 · 만점 ${maxScore}점 기준`;
}
</script>
</body>
</html>
