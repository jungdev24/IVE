<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>안유진 사진 모음 💜</title>
  <style>
    :root{--p:#7c4dff;--pk:#ff4081;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#0a0015;color:#fff;min-height:100vh;}

    /* HEADER */
    header{background:linear-gradient(135deg,#140028,#260049);border-bottom:1px solid #351560;padding:14px 16px;position:sticky;top:0;z-index:100;}
    .h-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .logo{font-size:1.2rem;font-weight:800;letter-spacing:1px;background:linear-gradient(90deg,#ce93d8,#f48fb1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .h-right{display:flex;gap:6px;align-items:center;}
    .cnt{background:linear-gradient(135deg,var(--p),var(--pk));padding:4px 12px;border-radius:20px;font-size:0.8rem;font-weight:700;}

    /* 추가 버튼 */
    .add-btn{background:linear-gradient(135deg,var(--p),var(--pk));border:none;border-radius:50%;width:44px;height:44px;position:fixed;bottom:24px;right:24px;z-index:90;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff;box-shadow:0 4px 20px rgba(124,77,255,0.5);transition:transform .2s;}
    .add-btn:hover{transform:scale(1.1);}

    /* 태그 필터 */
    .tags{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
    .tags::-webkit-scrollbar{display:none;}
    .tag-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.13);border-radius:20px;padding:4px 12px;color:rgba(255,255,255,0.55);font-size:0.73rem;cursor:pointer;white-space:nowrap;transition:all .2s;}
    .tag-btn:hover{background:rgba(124,77,255,0.28);color:#fff;}
    .tag-btn.on{background:linear-gradient(135deg,var(--p),var(--pk));border-color:transparent;color:#fff;font-weight:700;}

    /* 갤러리 그리드 */
    .gallery{column-count:3;column-gap:6px;padding:10px 10px 100px;}
    .gallery-item{break-inside:avoid;margin-bottom:6px;border-radius:10px;overflow:hidden;position:relative;cursor:pointer;background:#160030;transition:transform .15s;}
    .gallery-item:hover{transform:scale(1.02);}
    .gallery-item img{width:100%;display:block;}
    .gallery-item .fav{position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:0.85rem;cursor:pointer;transition:all .2s;backdrop-filter:blur(4px);}
    .gallery-item .fav.on{background:rgba(255,64,129,0.7);}
    .gallery-item .info{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.8));padding:20px 8px 6px;opacity:0;transition:opacity .2s;}
    .gallery-item:hover .info{opacity:1;}
    .info-date{font-size:0.62rem;color:rgba(255,255,255,0.5);}
    .info-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;}
    .info-tag{font-size:0.55rem;background:rgba(124,77,255,0.3);border-radius:3px;padding:1px 5px;color:#ce93d8;}
    .del-btn{position:absolute;top:6px;left:6px;width:24px;height:24px;border-radius:50%;background:rgba(255,0,0,0.5);display:none;align-items:center;justify-content:center;font-size:0.7rem;cursor:pointer;backdrop-filter:blur(4px);}
    .gallery-item:hover .del-btn{display:flex;}

    /* 빈 상태 */
    .empty{text-align:center;padding:80px 20px;color:rgba(255,255,255,0.25);line-height:2;}

    /* 드롭존 */
    .dropzone{position:fixed;inset:0;background:rgba(10,0,21,0.95);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;}
    .dropzone.active{display:flex;}
    .dropzone-inner{border:3px dashed rgba(124,77,255,0.5);border-radius:24px;padding:60px 40px;text-align:center;max-width:500px;width:90%;transition:border-color .2s;}
    .dropzone.dragover .dropzone-inner{border-color:#ce93d8;}
    .dropzone-icon{font-size:3rem;margin-bottom:10px;}
    .dropzone-text{font-size:1rem;color:rgba(255,255,255,0.5);margin-bottom:20px;}
    .dropzone-input{display:none;}
    .dropzone-browse{background:linear-gradient(135deg,var(--p),var(--pk));border:none;border-radius:12px;padding:12px 32px;color:#fff;font-size:0.9rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
    .dropzone-browse:hover{opacity:0.85;}
    .dropzone-close{position:absolute;top:20px;right:24px;background:none;border:none;color:rgba(255,255,255,0.4);font-size:1.5rem;cursor:pointer;}

    /* 태그 입력 */
    .tag-input-row{display:flex;gap:8px;margin-top:16px;width:90%;max-width:500px;}
    .tag-input{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:8px 14px;color:#fff;font-size:0.85rem;outline:none;}
    .tag-input::placeholder{color:rgba(255,255,255,0.3);}

    /* 뷰어 */
    .viewer{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:250;display:none;align-items:center;justify-content:center;flex-direction:column;}
    .viewer.open{display:flex;}
    .viewer img{max-width:95vw;max-height:85vh;object-fit:contain;border-radius:8px;}
    .viewer-close{position:absolute;top:16px;right:20px;background:none;border:none;color:rgba(255,255,255,0.5);font-size:1.8rem;cursor:pointer;}
    .viewer-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.08);border:none;border-radius:50%;width:44px;height:44px;color:#fff;font-size:1.2rem;cursor:pointer;backdrop-filter:blur(4px);}
    .viewer-nav.prev{left:12px;}
    .viewer-nav.next{right:12px;}
    .viewer-info{margin-top:12px;text-align:center;font-size:0.78rem;color:rgba(255,255,255,0.4);}

    @media(max-width:600px){.gallery{column-count:2;}}
    @media(min-width:900px){.gallery{column-count:4;}}
  </style>
</head>
<body>

<header>
  <div class="h-top">
    <div class="logo">💜 안유진 사진 모음</div>
    <div class="h-right">
      <div class="cnt" id="cnt">0장</div>
    </div>
  </div>
  <div class="tags" id="tagFilter">
    <button class="tag-btn on" onclick="filterTag('ALL',this)">전체</button>
    <button class="tag-btn" onclick="filterTag('♡',this)">♡ 즐겨찾기</button>
  </div>
</header>

<div class="gallery" id="gallery">
  <div class="empty" id="emptyState">
    사진이 없어요<br>
    오른쪽 아래 <b>+</b> 버튼을 누르거나<br>
    사진을 드래그해서 놓아보세요 💜
  </div>
</div>

<button class="add-btn" id="addBtn" onclick="openDropzone()">+</button>

<!-- 드롭존 -->
<div class="dropzone" id="dropzone">
  <button class="dropzone-close" onclick="closeDropzone()">✕</button>
  <div class="dropzone-inner" id="dropInner">
    <div class="dropzone-icon">📸</div>
    <div class="dropzone-text">사진을 드래그하거나 파일을 선택하세요</div>
    <input class="dropzone-input" type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)"/>
    <button class="dropzone-browse" onclick="document.getElementById('fileInput').click()">파일 선택</button>
  </div>
  <div class="tag-input-row">
    <input class="tag-input" id="tagInput" placeholder="태그 입력 (쉼표로 구분: 셀카, 무대, 직캠...)" />
  </div>
</div>

<!-- 뷰어 -->
<div class="viewer" id="viewer">
  <button class="viewer-close" onclick="closeViewer()">✕</button>
  <button class="viewer-nav prev" onclick="navViewer(-1)">‹</button>
  <button class="viewer-nav next" onclick="navViewer(1)">›</button>
  <img id="viewerImg" src=""/>
  <div class="viewer-info" id="viewerInfo"></div>
</div>

<script>
// ── 데이터 ──
let photos = JSON.parse(localStorage.getItem('yujin_photos')||'[]');
let favs = new Set(JSON.parse(localStorage.getItem('yujin_favs')||'[]'));
let curTag = 'ALL';
let viewIdx = 0;
let filtered = [];

// ── 렌더 ──
function render(){
  filtered = photos.filter(p=>{
    if(curTag==='ALL') return true;
    if(curTag==='♡') return favs.has(p.id);
    return (p.tags||[]).includes(curTag);
  });

  document.getElementById('cnt').textContent=`${filtered.length}장`;
  const g=document.getElementById('gallery');
  const e=document.getElementById('emptyState');

  if(!filtered.length){
    g.innerHTML='';
    g.appendChild(e);
    e.style.display='block';
    return;
  }

  let h='';
  filtered.forEach((p,i)=>{
    const isFav=favs.has(p.id);
    const tags=(p.tags||[]).map(t=>`<span class="info-tag">${t}</span>`).join('');
    h+=`<div class="gallery-item" onclick="openViewer(${i})">
      <img src="${p.data}" loading="lazy"/>
      <div class="fav ${isFav?'on':''}" onclick="event.stopPropagation();toggleFav('${p.id}',this)">♡</div>
      <div class="del-btn" onclick="event.stopPropagation();delPhoto('${p.id}')">✕</div>
      <div class="info">
        <div class="info-date">${p.date||''}</div>
        <div class="info-tags">${tags}</div>
      </div>
    </div>`;
  });
  g.innerHTML=h;
}

// ── 태그 필터 ──
function filterTag(tag,el){
  curTag=tag;
  document.querySelectorAll('.tag-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  render();
}

function buildTagButtons(){
  const allTags=new Set();
  photos.forEach(p=>(p.tags||[]).forEach(t=>allTags.add(t)));
  const container=document.getElementById('tagFilter');
  // 기존 동적 태그 제거 (전체, 즐겨찾기는 유지)
  container.querySelectorAll('.tag-dyn').forEach(b=>b.remove());
  allTags.forEach(t=>{
    const b=document.createElement('button');
    b.className='tag-btn tag-dyn';
    b.textContent=t;
    b.onclick=()=>filterTag(t,b);
    container.appendChild(b);
  });
}

// ── 즐겨찾기 ──
function toggleFav(id,el){
  if(favs.has(id)) favs.delete(id); else favs.add(id);
  localStorage.setItem('yujin_favs',JSON.stringify([...favs]));
  el.classList.toggle('on',favs.has(id));
  if(curTag==='♡') render();
}

// ── 삭제 ──
function delPhoto(id){
  if(!confirm('이 사진을 삭제할까요?')) return;
  photos=photos.filter(p=>p.id!==id);
  favs.delete(id);
  save();
  buildTagButtons();
  render();
}

// ── 드롭존 ──
function openDropzone(){
  document.getElementById('dropzone').classList.add('active');
}
function closeDropzone(){
  document.getElementById('dropzone').classList.remove('active');
}

// 드래그 & 드롭
const dz=document.getElementById('dropzone');
const di=document.getElementById('dropInner');
document.body.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('active','dragover');});
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
dz.addEventListener('dragleave',e=>{if(e.target===dz)dz.classList.remove('dragover');});
dz.addEventListener('drop',e=>{
  e.preventDefault();
  dz.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});

function handleFiles(files){
  const tagStr=document.getElementById('tagInput').value.trim();
  const tags=tagStr?tagStr.split(',').map(t=>t.trim()).filter(Boolean):[];
  const date=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'short',day:'numeric'});

  let count=0;
  const total=files.length;

  Array.from(files).forEach(file=>{
    if(!file.type.startsWith('image/')) return;
    const reader=new FileReader();
    reader.onload=e=>{
      const id='p_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
      photos.unshift({id, data:e.target.result, tags, date});
      count++;
      if(count===total){
        save();
        buildTagButtons();
        render();
        closeDropzone();
        document.getElementById('tagInput').value='';
      }
    };
    reader.readAsDataURL(file);
  });
}

// ── 뷰어 ──
function openViewer(i){
  viewIdx=i;
  showViewer();
}

function showViewer(){
  if(!filtered[viewIdx]) return;
  const p=filtered[viewIdx];
  document.getElementById('viewerImg').src=p.data;
  const tags=(p.tags||[]).join(', ');
  document.getElementById('viewerInfo').textContent=`${p.date||''}${tags?' · '+tags:''}  (${viewIdx+1}/${filtered.length})`;
  document.getElementById('viewer').classList.add('open');
}

function closeViewer(){
  document.getElementById('viewer').classList.remove('open');
}

function navViewer(dir){
  viewIdx=(viewIdx+dir+filtered.length)%filtered.length;
  showViewer();
}

// 키보드
document.addEventListener('keydown',e=>{
  if(document.getElementById('viewer').classList.contains('open')){
    if(e.key==='Escape') closeViewer();
    if(e.key==='ArrowLeft') navViewer(-1);
    if(e.key==='ArrowRight') navViewer(1);
  }
  if(document.getElementById('dropzone').classList.contains('active')){
    if(e.key==='Escape') closeDropzone();
  }
});

// ── 저장 ──
function save(){
  try{
    localStorage.setItem('yujin_photos',JSON.stringify(photos));
    localStorage.setItem('yujin_favs',JSON.stringify([...favs]));
  }catch(e){
    alert('저장 공간이 부족해요. 사진 수를 줄여주세요.');
  }
}

// ── 클립보드 붙여넣기 ──
document.addEventListener('paste',e=>{
  const items=e.clipboardData?.items;
  if(!items) return;
  const files=[];
  for(let i=0;i<items.length;i++){
    if(items[i].type.startsWith('image/')){
      files.push(items[i].getAsFile());
    }
  }
  if(files.length){
    openDropzone();
    setTimeout(()=>handleFiles(files),100);
  }
});

// ── 시작 ──
buildTagButtons();
render();
</script>
</body>
</html>
