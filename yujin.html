<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>안유진 사진 모음 💜</title>
  <style>
    :root{--p:#7c4dff;--pk:#ff4081;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#0a0015;color:#fff;min-height:100vh;}

    header{background:linear-gradient(135deg,#140028,#260049);border-bottom:1px solid #351560;padding:12px 16px;position:sticky;top:0;z-index:100;}
    .h-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .logo{font-size:1.15rem;font-weight:800;background:linear-gradient(90deg,#ce93d8,#f48fb1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .h-right{display:flex;gap:6px;align-items:center;}
    .cnt{background:linear-gradient(135deg,var(--p),var(--pk));padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:700;}
    .gear-btn{background:none;border:none;color:rgba(255,255,255,0.4);font-size:1.1rem;cursor:pointer;}

    .tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;}
    .tabs::-webkit-scrollbar{display:none;}
    .tag-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.13);border-radius:20px;padding:4px 11px;color:rgba(255,255,255,0.55);font-size:0.72rem;cursor:pointer;white-space:nowrap;transition:all .2s;}
    .tag-btn:hover{background:rgba(124,77,255,0.25);color:#fff;}
    .tag-btn.on{background:linear-gradient(135deg,var(--p),var(--pk));border-color:transparent;color:#fff;font-weight:700;}

    /* 검색 바 */
    .search-row{display:flex;gap:6px;margin-bottom:8px;}
    .search-row input{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.13);border-radius:9px;padding:7px 12px;color:#fff;font-size:0.82rem;outline:none;}
    .search-row input::placeholder{color:rgba(255,255,255,0.3);}
    .fetch-btn{background:linear-gradient(135deg,var(--p),var(--pk));border:none;border-radius:9px;padding:7px 14px;color:#fff;font-size:0.78rem;font-weight:700;cursor:pointer;white-space:nowrap;}

    /* 갤러리 */
    .gallery{column-count:3;column-gap:5px;padding:8px 8px 100px;}
    .gallery-item{break-inside:avoid;margin-bottom:5px;border-radius:9px;overflow:hidden;position:relative;cursor:pointer;background:#160030;transition:transform .15s;}
    .gallery-item:hover{transform:scale(1.02);}
    .gallery-item img{width:100%;display:block;}
    .gallery-item .fav{position:absolute;top:5px;right:5px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:0.8rem;cursor:pointer;backdrop-filter:blur(4px);}
    .gallery-item .fav.on{background:rgba(255,64,129,0.7);}
    .gallery-item .del-btn{position:absolute;top:5px;left:5px;width:22px;height:22px;border-radius:50%;background:rgba(255,0,0,0.5);display:none;align-items:center;justify-content:center;font-size:0.65rem;cursor:pointer;backdrop-filter:blur(4px);}
    .gallery-item:hover .del-btn{display:flex;}
    .gallery-item .info{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.8));padding:18px 7px 5px;opacity:0;transition:opacity .2s;}
    .gallery-item:hover .info{opacity:1;}
    .info-date{font-size:0.58rem;color:rgba(255,255,255,0.5);}
    .info-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px;}
    .info-tag{font-size:0.52rem;background:rgba(124,77,255,0.3);border-radius:3px;padding:1px 4px;color:#ce93d8;}
    .info-src{font-size:0.48rem;color:rgba(255,255,255,0.25);margin-top:2px;}

    .empty{text-align:center;padding:80px 20px;color:rgba(255,255,255,0.22);line-height:2;}
    .add-btn{background:linear-gradient(135deg,var(--p),var(--pk));border:none;border-radius:50%;width:44px;height:44px;position:fixed;bottom:24px;right:24px;z-index:90;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff;box-shadow:0 4px 20px rgba(124,77,255,0.5);}

    /* 드롭존 */
    .dropzone{position:fixed;inset:0;background:rgba(10,0,21,0.95);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
    .dropzone.active{display:flex;}
    .dropzone-inner{border:3px dashed rgba(124,77,255,0.5);border-radius:20px;padding:50px 36px;text-align:center;max-width:460px;width:90%;}
    .dropzone.dragover .dropzone-inner{border-color:#ce93d8;}
    .dropzone-icon{font-size:2.5rem;margin-bottom:8px;}
    .dropzone-text{font-size:0.9rem;color:rgba(255,255,255,0.45);margin-bottom:16px;}
    .dropzone-input{display:none;}
    .dropzone-browse{background:linear-gradient(135deg,var(--p),var(--pk));border:none;border-radius:10px;padding:10px 28px;color:#fff;font-size:0.85rem;font-weight:700;cursor:pointer;}
    .dropzone-close{position:absolute;top:18px;right:22px;background:none;border:none;color:rgba(255,255,255,0.4);font-size:1.4rem;cursor:pointer;}
    .tag-input-row{display:flex;gap:8px;width:90%;max-width:460px;}
    .tag-input{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:9px;padding:8px 12px;color:#fff;font-size:0.82rem;outline:none;}
    .tag-input::placeholder{color:rgba(255,255,255,0.3);}

    /* 뷰어 */
    .viewer{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:250;display:none;align-items:center;justify-content:center;flex-direction:column;}
    .viewer.open{display:flex;}
    .viewer img{max-width:95vw;max-height:85vh;object-fit:contain;border-radius:8px;}
    .viewer-close{position:absolute;top:14px;right:18px;background:none;border:none;color:rgba(255,255,255,0.5);font-size:1.6rem;cursor:pointer;}
    .viewer-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.08);border:none;border-radius:50%;width:42px;height:42px;color:#fff;font-size:1.1rem;cursor:pointer;backdrop-filter:blur(4px);}
    .viewer-nav.prev{left:10px;}
    .viewer-nav.next{right:10px;}
    .viewer-info{margin-top:10px;text-align:center;font-size:0.75rem;color:rgba(255,255,255,0.35);}

    /* 설정 모달 */
    .settings{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:350;display:none;align-items:center;justify-content:center;padding:20px;}
    .settings.open{display:flex;}
    .settings-box{background:#140028;border:1px solid rgba(124,77,255,0.3);border-radius:16px;padding:24px 20px;max-width:420px;width:100%;}
    .settings-title{font-size:1rem;font-weight:700;margin-bottom:14px;}
    .settings-label{font-size:0.72rem;color:rgba(255,255,255,0.4);margin-bottom:4px;}
    .settings-input{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.13);border-radius:8px;padding:8px 12px;color:#fff;font-size:0.82rem;outline:none;margin-bottom:12px;}
    .settings-input::placeholder{color:rgba(255,255,255,0.25);}
    .settings-help{font-size:0.65rem;color:rgba(255,255,255,0.25);line-height:1.5;margin-bottom:14px;}
    .settings-help a{color:#ce93d8;}
    .settings-btns{display:flex;gap:8px;}
    .settings-save{flex:1;padding:10px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--p),var(--pk));color:#fff;font-size:0.85rem;font-weight:700;cursor:pointer;}
    .settings-cancel{padding:10px 16px;border:1px solid rgba(255,255,255,0.15);border-radius:10px;background:none;color:rgba(255,255,255,0.5);font-size:0.85rem;cursor:pointer;}
    .settings-status{font-size:0.7rem;margin-top:10px;text-align:center;}
    .settings-status.ok{color:#69f0ae;}
    .settings-status.err{color:#ff8a80;}

    /* 로딩 */
    .fetch-loading{text-align:center;padding:20px;color:rgba(255,255,255,0.3);font-size:0.8rem;}
    .fspin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.1);border-top-color:#ce93d8;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes sp{to{transform:rotate(360deg);}}

    @media(max-width:600px){.gallery{column-count:2;}}
    @media(min-width:900px){.gallery{column-count:4;}}
  </style>
</head>
<body>

<header>
  <div class="h-top">
    <div class="logo">💜 안유진 사진 모음</div>
    <div class="h-right">
      <button class="gear-btn" onclick="openSettings()">⚙️</button>
      <div class="cnt" id="cnt">0장</div>
    </div>
  </div>
  <div class="search-row">
    <button class="fetch-btn" onclick="fetchFromX()" style="background:linear-gradient(135deg,#1d9bf0,#0d8bd9)">𝕏 최신 사진</button>
    <input id="searchQ" placeholder="네이버 검색어" value="아이브 안유진" style="flex:1"/>
    <button class="fetch-btn" onclick="fetchImages()">🔍 네이버</button>
  </div>
  <div class="tabs" id="tagFilter">
    <button class="tag-btn on" onclick="filterTag('ALL',this)">전체</button>
    <button class="tag-btn" onclick="filterTag('♡',this)">♡ 즐겨찾기</button>
    <button class="tag-btn" onclick="filterTag('𝕏',this)">𝕏 트위터</button>
    <button class="tag-btn" onclick="filterTag('네이버',this)">🔍 네이버</button>
    <button class="tag-btn" onclick="filterTag('직접추가',this)">📸 직접추가</button>
  </div>
</header>

<div class="gallery" id="gallery">
  <div class="empty" id="emptyState">
    <b>𝕏 최신 사진</b> 버튼을 눌러<br>
    트위터에서 안유진 사진을 바로 불러오세요!<br><br>
    네이버 검색이나 직접 추가도 가능 💜
  </div>
</div>

<button class="add-btn" onclick="openDropzone()">+</button>

<!-- 드롭존 -->
<div class="dropzone" id="dropzone">
  <button class="dropzone-close" onclick="closeDropzone()">✕</button>
  <div class="dropzone-inner" id="dropInner">
    <div class="dropzone-icon">📸</div>
    <div class="dropzone-text">사진을 드래그하거나 파일을 선택하세요</div>
    <input class="dropzone-input" type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)"/>
    <button class="dropzone-browse" onclick="document.getElementById('fileInput').click()">파일 선택</button>
  </div>
  <div class="tag-input-row">
    <input class="tag-input" id="tagInput" placeholder="태그 (쉼표 구분: 셀카, 무대, 직캠...)"/>
  </div>
</div>

<!-- 뷰어 -->
<div class="viewer" id="viewer">
  <button class="viewer-close" onclick="closeViewer()">✕</button>
  <button class="viewer-nav prev" onclick="navViewer(-1)">‹</button>
  <button class="viewer-nav next" onclick="navViewer(1)">›</button>
  <img id="viewerImg" src=""/>
  <div class="viewer-info" id="viewerInfo"></div>
</div>

<!-- 설정 -->
<div class="settings" id="settings" onclick="if(event.target===this)closeSettings()">
  <div class="settings-box">
    <div class="settings-title">⚙️ 네이버 API 설정</div>
    <div class="settings-label">Client ID</div>
    <input class="settings-input" id="naverCid" placeholder="네이버 Client ID 입력"/>
    <div class="settings-label">Client Secret</div>
    <input class="settings-input" id="naverCsec" placeholder="네이버 Client Secret 입력"/>
    <div class="settings-help">
      무료 발급 방법:<br>
      1. <a href="https://developers.naver.com/apps/#/register" target="_blank">네이버 개발자 센터</a> 접속 → 로그인<br>
      2. 애플리케이션 등록 → 사용 API: <b>검색</b> 선택<br>
      3. 환경: <b>WEB</b> → URL에 <b>https://ive-fan-app.pages.dev</b> 입력<br>
      4. 발급된 Client ID와 Secret을 여기에 붙여넣기
    </div>
    <div class="settings-btns">
      <button class="settings-cancel" onclick="closeSettings()">취소</button>
      <button class="settings-save" onclick="saveSettings()">저장</button>
    </div>
    <div class="settings-status" id="settingsStatus"></div>
  </div>
</div>

<script>
// ── 데이터 ──
let photos = JSON.parse(localStorage.getItem('yujin_photos')||'[]');
let favs = new Set(JSON.parse(localStorage.getItem('yujin_favs')||'[]'));
let curTag = 'ALL';
let viewIdx = 0;
let filtered = [];

// ── 네이버 API 키 ──
let naverCid = localStorage.getItem('naver_cid')||'';
let naverCsec = localStorage.getItem('naver_csec')||'';

// ── 렌더 ──
function render(){
  filtered = photos.filter(p=>{
    if(curTag==='ALL') return true;
    if(curTag==='♡') return favs.has(p.id);
    return (p.tags||[]).includes(curTag);
  });
  document.getElementById('cnt').textContent=`${filtered.length}장`;
  const g=document.getElementById('gallery');
  if(!filtered.length){
    g.innerHTML=document.getElementById('emptyState').outerHTML;
    return;
  }
  let h='';
  filtered.forEach((p,i)=>{
    const isFav=favs.has(p.id);
    const tags=(p.tags||[]).map(t=>`<span class="info-tag">${t}</span>`).join('');
    const src=p.src?`<div class="info-src">${p.src}</div>`:'';
    // URL 기반 이미지 또는 base64
    const imgSrc=p.url||p.data||'';
    h+=`<div class="gallery-item" onclick="openViewer(${i})">
      <img src="${imgSrc}" loading="lazy" onerror="this.parentElement.style.display='none'"/>
      <div class="fav ${isFav?'on':''}" onclick="event.stopPropagation();toggleFav('${p.id}',this)">♡</div>
      <div class="del-btn" onclick="event.stopPropagation();delPhoto('${p.id}')">✕</div>
      <div class="info">
        <div class="info-date">${p.date||''}</div>
        <div class="info-tags">${tags}</div>
        ${src}
      </div>
    </div>`;
  });
  g.innerHTML=h;
}

// ── 태그 필터 ──
function filterTag(tag,el){
  curTag=tag;
  document.querySelectorAll('.tag-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  render();
}

// ── 즐겨찾기 ──
function toggleFav(id,el){
  if(favs.has(id)) favs.delete(id); else favs.add(id);
  localStorage.setItem('yujin_favs',JSON.stringify([...favs]));
  el.classList.toggle('on',favs.has(id));
  if(curTag==='♡') render();
}

// ── 삭제 ──
function delPhoto(id){
  if(!confirm('이 사진을 삭제할까요?')) return;
  photos=photos.filter(p=>p.id!==id);
  favs.delete(id);
  save(); render();
}

// ── 드롭존 ──
function openDropzone(){ document.getElementById('dropzone').classList.add('active'); }
function closeDropzone(){ document.getElementById('dropzone').classList.remove('active'); }

document.body.addEventListener('dragover',e=>{e.preventDefault();document.getElementById('dropzone').classList.add('active','dragover');});
const dz=document.getElementById('dropzone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
dz.addEventListener('dragleave',e=>{if(e.target===dz)dz.classList.remove('dragover');});
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');handleFiles(e.dataTransfer.files);});

function handleFiles(files){
  const tagStr=document.getElementById('tagInput').value.trim();
  const tags=tagStr?tagStr.split(',').map(t=>t.trim()).filter(Boolean):[];
  tags.push('직접추가');
  const date=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'short',day:'numeric'});
  let count=0;
  const total=files.length;
  Array.from(files).forEach(file=>{
    if(!file.type.startsWith('image/')) return;
    const reader=new FileReader();
    reader.onload=e=>{
      const id='p_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
      photos.unshift({id, data:e.target.result, tags, date});
      count++;
      if(count===total){ save(); render(); closeDropzone(); document.getElementById('tagInput').value=''; }
    };
    reader.readAsDataURL(file);
  });
}

// 클립보드 붙여넣기
document.addEventListener('paste',e=>{
  const items=e.clipboardData?.items;
  if(!items) return;
  const files=[];
  for(let i=0;i<items.length;i++){
    if(items[i].type.startsWith('image/')) files.push(items[i].getAsFile());
  }
  if(files.length){ openDropzone(); setTimeout(()=>handleFiles(files),100); }
});

// ── 뷰어 ──
function openViewer(i){ viewIdx=i; showViewer(); }
function showViewer(){
  if(!filtered[viewIdx]) return;
  const p=filtered[viewIdx];
  document.getElementById('viewerImg').src=p.url||p.data||'';
  const tags=(p.tags||[]).join(', ');
  document.getElementById('viewerInfo').textContent=`${p.date||''}${tags?' · '+tags:''}  (${viewIdx+1}/${filtered.length})`;
  document.getElementById('viewer').classList.add('open');
}
function closeViewer(){ document.getElementById('viewer').classList.remove('open'); }
function navViewer(dir){ viewIdx=(viewIdx+dir+filtered.length)%filtered.length; showViewer(); }

document.addEventListener('keydown',e=>{
  if(document.getElementById('viewer').classList.contains('open')){
    if(e.key==='Escape') closeViewer();
    if(e.key==='ArrowLeft') navViewer(-1);
    if(e.key==='ArrowRight') navViewer(1);
  }
  if(document.getElementById('dropzone').classList.contains('active')&&e.key==='Escape') closeDropzone();
  if(document.getElementById('settings').classList.contains('open')&&e.key==='Escape') closeSettings();
});

// ── 저장 ──
function save(){
  // URL 기반 사진은 용량 작음, base64는 큼
  try{ localStorage.setItem('yujin_photos',JSON.stringify(photos)); }
  catch(e){ alert('저장 공간 부족! 오래된 사진을 삭제해 주세요.'); }
  localStorage.setItem('yujin_favs',JSON.stringify([...favs]));
}

// ── 설정 ──
function openSettings(){
  document.getElementById('naverCid').value=naverCid;
  document.getElementById('naverCsec').value=naverCsec;
  document.getElementById('settingsStatus').textContent='';
  document.getElementById('settings').classList.add('open');
}
function closeSettings(){ document.getElementById('settings').classList.remove('open'); }
function saveSettings(){
  naverCid=document.getElementById('naverCid').value.trim();
  naverCsec=document.getElementById('naverCsec').value.trim();
  localStorage.setItem('naver_cid',naverCid);
  localStorage.setItem('naver_csec',naverCsec);
  const st=document.getElementById('settingsStatus');
  if(naverCid&&naverCsec){
    st.textContent='✅ 저장 완료! 이제 검색 버튼을 눌러보세요.';
    st.className='settings-status ok';
  } else {
    st.textContent='❌ Client ID와 Secret을 모두 입력해 주세요.';
    st.className='settings-status err';
  }
}

// ── X(트위터) 사진 가져오기 (Cloudflare Worker 경유) ──
const WORKER_URL = 'https://ive-api.jungdev24.workers.dev';
const X_ACCOUNTS = [
  '_yujjin_an',    // 유진 팬계정
  '_yujin_an_',    // 유진 팬계정 2
  'IVEstarship',   // IVE 공식
];

async function fetchFromX(){
  const gallery=document.getElementById('gallery');
  gallery.innerHTML='<div class="fetch-loading"><span class="fspin"></span>𝕏 에서 안유진 사진 가져오는 중...</div>';

  const existingUrls=new Set(photos.map(p=>p.url).filter(Boolean));
  let totalAdded=0;
  const date=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'short',day:'numeric'});

  for(const account of X_ACCOUNTS){
    try{
      const r=await fetch(`${WORKER_URL}/x/${account}`);
      if(!r.ok) continue;
      const data=await r.json();
      const images=data.images||[];

      images.forEach(url=>{
        if(existingUrls.has(url)) return;
        const id='x_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
        photos.unshift({ id, url, tags:['𝕏'], date, src:`@${account}` });
        existingUrls.add(url);
        totalAdded++;
      });
    }catch(e){
      console.log('X fetch error:',account,e);
    }
  }

  save();
  render();

  if(totalAdded===0) alert('새로운 사진이 없어요. 이미 최신 상태입니다!');
  else gallery.scrollTo({top:0,behavior:'smooth'});
}

// ── 네이버 이미지 검색 ──
async function fetchImages(){
  if(!naverCid||!naverCsec){
    openSettings();
    return;
  }
  const query=document.getElementById('searchQ').value.trim()||'아이브 안유진';
  const gallery=document.getElementById('gallery');
  gallery.innerHTML='<div class="fetch-loading"><span class="fspin"></span>네이버에서 이미지 검색 중...</div>';

  let data=null;

  // Cloudflare Worker 경유 (CORS 문제 없음)
  try{
    const r=await fetch(`${WORKER_URL}/naver?q=${encodeURIComponent(query)}&cid=${encodeURIComponent(naverCid)}&csec=${encodeURIComponent(naverCsec)}`);
    if(r.ok) data=await r.json();
  }catch(e){}

  // 폴백: 직접 호출
  if(!data){
    try{
      const apiUrl=`https://openapi.naver.com/v1/search/image?query=${encodeURIComponent(query)}&display=30&sort=date`;
      const r=await fetch(apiUrl,{headers:{'X-Naver-Client-Id':naverCid,'X-Naver-Client-Secret':naverCsec}});
      if(r.ok) data=await r.json();
    }catch(e){}
  }

  if(!data||!data.items){
    gallery.innerHTML='<div class="fetch-loading">검색 실패 — API 키를 확인하거나 잠시 후 다시 시도해 주세요.</div>';
    return;
  }

  // 기존에 있는 URL 중복 방지
  const existingUrls=new Set(photos.map(p=>p.url).filter(Boolean));
  const date=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'short',day:'numeric'});
  let added=0;

  data.items.forEach(item=>{
    const url=item.link||item.thumbnail||'';
    if(!url||existingUrls.has(url)) return;
    const id='nv_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
    const title=(item.title||'').replace(/<[^>]*>/g,'');
    photos.unshift({
      id,
      url,
      tags:['네이버'],
      date,
      src: title.slice(0,40),
    });
    existingUrls.add(url);
    added++;
  });

  save();
  render();

  if(added===0){
    alert('새로운 이미지가 없어요. 다른 검색어를 시도해 보세요!');
  }
}

// ── 시작 ──
render();

// API 키가 있으면 자동으로 최신 이미지 로드
if(naverCid && naverCsec && photos.length===0){
  fetchImages();
}
</script>
</body>
</html>
